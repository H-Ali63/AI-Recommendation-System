# nginx/conf.d/locations.conf
# Included by both HTTP and HTTPS server blocks

# ── API routes → FastAPI backend ─────────────────────────────
location /api/ {
    limit_req zone=api_limit burst=20 nodelay;

    proxy_pass         http://backend/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";

    proxy_read_timeout  60s;
    proxy_send_timeout  60s;
    proxy_connect_timeout 10s;
}

# ── Swagger / Docs → FastAPI ──────────────────────────────────
location /docs {
    proxy_pass         http://backend/docs;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
}

location /openapi.json {
    proxy_pass         http://backend/openapi.json;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
}

# ── Health check → FastAPI ────────────────────────────────────
location /health {
    proxy_pass         http://backend/health;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    access_log off;
}

# ── WebSocket for Streamlit live updates ──────────────────────
location /_stcore/stream {
    proxy_pass         http://frontend/_stcore/stream;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_read_timeout 86400s;
}

# ── All other traffic → Streamlit frontend ───────────────────
location / {
    proxy_pass         http://frontend/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_read_timeout 86400s;
}
