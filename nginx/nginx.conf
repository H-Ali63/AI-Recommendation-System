# ════════════════════════════════════════════════════════════════
#  Nginx Configuration — RecommendAI
#
#  Routing:
#    /          → Streamlit frontend   (port 8501)
#    /api       → FastAPI backend      (port 8000)
#    /docs      → FastAPI Swagger UI   (port 8000)
#    /health    → FastAPI health       (port 8000)
# ════════════════════════════════════════════════════════════════

worker_processes auto;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log  /var/log/nginx/access.log main;
    error_log   /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Security headers (applied to all responses)
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

    # ── Upstream definitions ─────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:8501;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect (comment out if not using SSL) ─
    server {
        listen 80;
        server_name _;

        # For Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP to HTTPS
        # Uncomment when SSL is configured:
        # return 301 https://$host$request_uri;

        # For local / non-SSL deployments, remove the redirect above
        # and include the location blocks from the HTTPS server below:
        include /etc/nginx/conf.d/locations.conf;
    }

    # ── HTTPS server (uncomment when SSL certs are available) ─
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     include /etc/nginx/conf.d/locations.conf;
    # }
}
